spring.application.name=backend

# ── PostgreSQL (Supabase) ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ── HikariCP (connection pool) ────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:21600000}

# ── Supabase Storage ──────────────────────────────────────────────
supabase.project-url=${SUPABASE_PROJECT_URL}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.storage.bucket=${SUPABASE_STORAGE_BUCKET:productos}

# ── Server ────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── CORS ──────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Multipart ─────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── HekaEntrega ───────────────────────────────────────────────────
heka.api-key=${HEKA_API_KEY:}
heka.email=${HEKA_EMAIL:}
heka.password=${HEKA_PASSWORD:}
heka.channel=${HEKA_CHANNEL:hekaentrega}
heka.base-url=${HEKA_BASE_URL:https://api.hekaentrega.co}
heka.warehouse-id=${HEKA_WAREHOUSE_ID:}
heka.city-origin=${HEKA_CITY_ORIGIN:}
heka.default-weight=${HEKA_DEFAULT_WEIGHT:1}
heka.default-height=${HEKA_DEFAULT_HEIGHT:10}
heka.default-long=${HEKA_DEFAULT_LONG:10}
heka.default-width=${HEKA_DEFAULT_WIDTH:10}

# ── Meta Facebook Ads ────────────────────────────────────────────
meta.pixel-id=${META_PIXEL_ID:}
meta.access-token=${META_CAPI_ACCESS_TOKEN:}
meta.base-url=https://graph.facebook.com/v22.0
meta.enabled=${META_ENABLED:true}
meta.catalog-token=${META_CATALOG_TOKEN:}
meta.test-event-code=${META_TEST_EVENT_CODE:}
